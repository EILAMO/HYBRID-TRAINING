<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="APEX">
  <meta name="theme-color" content="#080808">
  <title>APEX</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/style.css">
</head>
<body>
  <div id="app">
    <div id="splash">
      <div class="splash-inner">
        <div class="splash-logo">APEX</div>
        <div class="splash-tagline">Training System</div>
        <div class="splash-loader"><div class="splash-loader-bar"></div></div>
      </div>
    </div>
    <nav id="bottom-nav">
      <button class="nav-btn active" data-view="home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12L12 3l9 9"/><path d="M5 10v9a1 1 0 001 1h4v-5h4v5h4a1 1 0 001-1v-9"/></svg>
        <span>Home</span>
      </button>
      <button class="nav-btn" data-view="workout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4v16M18 4v16M3 8h4M17 8h4M3 16h4M17 16h4"/></svg>
        <span>Lift</span>
      </button>
      <button class="nav-btn" data-view="run">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="13" cy="5" r="1.5"/><path d="M10 9l-2 5h3l1 5M10 9l3 2 2-3M13 11l2 4h3"/></svg>
        <span>Run</span>
      </button>
      <button class="nav-btn" data-view="nutrition">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a7 7 0 017 7c0 4-3 7-7 9-4-2-7-5-7-9a7 7 0 017-7z"/></svg>
        <span>Nutrition</span>
      </button>
      <button class="nav-btn" data-view="progress">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <span>Progress</span>
      </button>
      <button class="nav-btn" data-view="body">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Body</span>
      </button>
    </nav>
    <main id="views">
      <div id="view-home" class="view active"></div>
      <div id="view-workout" class="view"></div>
      <div id="view-run" class="view"></div>
      <div id="view-nutrition" class="view"></div>
      <div id="view-progress" class="view"></div>
      <div id="view-body" class="view"></div>
    </main>
    <div id="modal-overlay" class="hidden"><div id="modal-box"><div class="modal-handle"></div><div id="modal-content"></div></div></div>
    <div id="toast"></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="src/db.js"></script>
  <script src="src/data.js"></script>
  <script src="src/utils.js"></script>
  <script src="src/views/home.js"></script>
  <script src="src/views/workout.js"></script>
  <script src="src/views/run.js"></script>
  <script src="src/views/nutrition.js"></script>
  <script src="src/views/progress.js"></script>
  <script src="src/views/body.js"></script>
  <script src="src/app.js"></script>
</body>
</html>
